name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

# Serialize release runs so two quick pushes can't race to push the
# `chore(release) [skip ci]` commit back to main.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Root package (appclaw).
      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Build
        run: npm run build

      # appclaw-agent is published in the SAME semantic-release run (see the
      # @semantic-release/exec plugin in .releaserc.json), locked to the same
      # version as appclaw. Build it here so its dist/ is ready to publish.
      - name: Install agent dependencies
        working-directory: packages/appclaw-agent
        run: npm install --no-package-lock

      - name: Build agent
        working-directory: packages/appclaw-agent
        run: npm run build

      # Single release process → one version, one tag, one push to main for
      # BOTH packages. No second job, so the "branch is behind" race is gone.
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
